<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swirl Submission Sanity Check</title>
    <style>
      :root {
        --bg-color: #faf6ee;
        --card-bg: #ffffff;
        --text-color: #4a3e3d;
        --border-color: #e6dfd5;
        --accent-color: #d97706;
        --accent-hover: #b45309;
        --flag-bg: #fee2e2;
        --flag-text: #991b1b;
        --success-bg: #d1fae5;
        --success-text: #065f46;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 40px 20px;
        line-height: 1.5;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      h1 {
        font-size: 2.25rem;
        color: #2e2524;
        margin-bottom: 8px;
        font-weight: 700;
      }

      .subtitle {
        color: #7c6e6d;
        margin-top: 0;
        margin-bottom: 32px;
      }

      #var-container {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 24px;
        display: none;
        flex-direction: column;
        gap: 16px;
        max-width: 500px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .input-group label {
        font-size: 0.875rem;
        font-weight: 600;
        color: #615251;
      }

      input,
      select {
        padding: 10px 12px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        font-size: 1rem;
        color: var(--text-color);
        background-color: #fdfcfb;
      }

      input:focus,
      select:focus {
        outline: 2px solid var(--accent-color);
        outline-offset: -1px;
      }

      button {
        cursor: pointer;
        font-size: 1rem;
        font-weight: 500;
        border-radius: 6px;
        transition: all 0.2s;
      }

      #fetchRecordsButton {
        width: fit-content;
        padding: 10px 20px;
        background-color: var(--accent-color);
        color: white;
        border: none;
      }

      #fetchRecordsButton:hover {
        background-color: var(--accent-hover);
      }

      #modify-credentials {
        display: none;
        padding: 6px 12px;
        background: transparent;
        border: 1px solid var(--border-color);
        color: #7c6e6d;
        font-size: 0.875rem;
        margin-bottom: 24px;
      }

      #modify-credentials:hover {
        background: #f3ece0;
        color: var(--text-color);
      }

      /* Controls & Filter Section */
      .controls-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 16px;
        margin-bottom: 20px;
      }

      .filters {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }

      .filter-btn {
        padding: 8px 16px;
        background: #f3ece0;
        border: 1px solid var(--border-color);
        color: var(--text-color);
      }

      .filter-btn:hover {
        background: #ebdcc5;
      }

      .filter-btn.active {
        background: var(--text-color);
        color: #ffffff;
        border-color: var(--text-color);
      }

      .review-status-pending {
        color: #d97706;
        font-size: 0.85rem;
        font-weight: 600;
      }
      .review-status-approved {
        color: #16a34a;
        font-size: 0.85rem;
        font-weight: 600;
      }
      .review-status-rejected {
        color: #dc2626;
        font-size: 0.85rem;
        font-weight: 600;
      }
      .review-status-changes-requested {
        color: #1709b4;
        font-size: 0.85rem;
        font-weight: 600;
      }

      .event-select-wrapper {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-left: 8px;
        border-left: 2px solid var(--border-color);
        padding-left: 16px;
      }

      .event-select-wrapper label {
        font-size: 0.875rem;
        font-weight: 600;
      }

      .status-text {
        font-weight: 500;
        color: #7c6e6d;
      }

      /* Results Table Layout */
      .table-wrapper {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
        font-size: 0.95rem;
      }

      th {
        background-color: #f6efe4;
        color: #2e2524;
        font-weight: 600;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border-color);
      }

      td {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border-color);
        vertical-align: top;
      }

      tr:last-child td {
        border-bottom: none;
      }

      tr:hover td {
        background-color: #fdfbfa;
      }

      .badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.05em;
      }

      .badge-workshop {
        background-color: #e0f2fe;
        color: #0369a1;
      }

      .badge-individual {
        background-color: #f3e8ff;
        color: #6b21a8;
      }

      .reason-tag {
        display: block;
        background-color: var(--flag-bg);
        color: var(--flag-text);
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 0.85rem;
        margin-bottom: 4px;
        width: fit-content;
      }

      .reason-tag a {
        color: currentColor;
        font-weight: 600;
        text-decoration: underline;
      }

      .reason-tag:last-child {
        margin-bottom: 0;
      }

      .no-flags {
        color: var(--success-text);
        background-color: var(--success-bg);
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 0.85rem;
        width: fit-content;
      }

      .text-muted {
        color: #9c8e8d;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>swirl sanity check</h1>

      <button id="modify-credentials" onclick="modifyCredentials()">Modify Credentials</button>

      <div id="var-container">
        <div class="input-group">
          <label for="baseID">Airtable Base ID</label>
          <input id="baseID" placeholder="appXXXXXXXXXXXXXX" />
        </div>
        <div class="input-group">
          <label for="tableID">Table ID / Name</label>
          <input id="tableID" placeholder="tblXXXXXXXXXXXXXX" />
        </div>
        <div class="input-group">
          <label for="viewID">View ID (for "All" / Origin Grid View)</label>
          <input id="viewID" placeholder="viwXXXXXXXXXXXXXX" />
        </div>
        <div class="input-group">
          <label for="airtablePAT">Airtable Personal Access Token (PAT)</label>
          <input id="airtablePAT" type="password" placeholder="pat.XXXXXXXXXXXXXXXXXXXXXXXX" />
        </div>
        <button id="fetchRecordsButton" onclick="fetchRecords()">Set Credentials & Run Check</button>
      </div>

      <div id="results-section" style="display: none">
        <div class="controls-bar">
          <div class="filters">
            <button class="filter-btn active" onclick="setFilter('flagged', this)">all flagged pending</button>
            <button class="filter-btn" onclick="setFilter('workshop', this)">workshop flagged pending</button>
            <button class="filter-btn" onclick="setFilter('individual', this)">individual flagged pending</button>

            <div class="event-select-wrapper" style="display: flex">
              <label for="eventCodeFilter">Or Specific Event:</label>
              <select id="eventCodeFilter" onchange="setEventFilter(this.value)" style="max-width: 300px">
                <option value="">-- select code (shows all) --</option>
              </select>
            </div>
          </div>
          <div id="status-display" class="status-text">Processing...</div>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>submission</th>
                <th>flags</th>
              </tr>
            </thead>
            <tbody id="records-table-body">
              <!-- Dynamically populated rows -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const thirteenYearsInMs = 13 * 365 * 24 * 60 * 60 * 1000;
      const nineteenYearsInMs = 19 * 365 * 24 * 60 * 60 * 1000;

      let globalAllRecords = [];
      let globalPendingRecords = [];
      let globalFlaggedMap = {};
      let currentFilter = "flagged";
      let selectedEventCode = "";

      async function fetchRecords() {
        var records = [];
        const baseID = document.getElementById("baseID").value;
        const tableID = document.getElementById("tableID").value;
        const viewID = document.getElementById("viewID").value;
        const airtablePAT = document.getElementById("airtablePAT").value;

        if (!baseID || !tableID || !viewID || !airtablePAT) {
          alert("Please fill in all identity credentials.");
          return;
        }

        localStorage.setItem("baseID", baseID);
        localStorage.setItem("tableID", tableID);
        localStorage.setItem("viewID", viewID);
        localStorage.setItem("airtablePAT", airtablePAT);

        document.getElementById("modify-credentials").style.display = "inline-block";
        document.getElementById("var-container").style.display = "none";
        document.getElementById("results-section").style.display = "block";
        document.getElementById("status-display").textContent = "Fetching records from Airtable...";

        let offset = "";
        try {
          while (true) {
            const resp = await fetch(`https://api.airtable.com/v0/${baseID}/${tableID}?offset=${offset}`, {
              method: "GET",
              headers: { Authorization: `Bearer ${airtablePAT}` },
            });
            if (!resp.ok) throw new Error("Airtable API breakdown. Check your credentials.");
            const data = await resp.json();
            records = records.concat(data.records);
            if (!data.offset) break;
            offset = data.offset;
          }

          document.getElementById("status-display").textContent = "running sanity checker";
          console.log("fetched records:", records);
          await processAndRender(records);
        } catch (err) {
          document.getElementById("status-display").textContent = "error: " + err.message;
        }
      }

      function modifyCredentials() {
        document.getElementById("var-container").style.display = "flex";
        document.getElementById("modify-credentials").style.display = "none";
      }

      async function onLoad() {
        const baseID = localStorage.getItem("baseID");
        const tableID = localStorage.getItem("tableID");
        const viewID = localStorage.getItem("viewID");
        const airtablePAT = localStorage.getItem("airtablePAT");
        if (baseID && tableID && viewID && airtablePAT) {
          document.getElementById("modify-credentials").style.display = "inline-block";
          document.getElementById("baseID").value = baseID;
          document.getElementById("tableID").value = tableID;
          document.getElementById("viewID").value = viewID;
          document.getElementById("airtablePAT").value = airtablePAT;
          await fetchRecords();
        } else {
          document.getElementById("var-container").style.display = "flex";
        }
      }

      async function processAndRender(records) {
        globalAllRecords = records;
        globalPendingRecords = records.filter((record) => record.fields["Review Status"] === "Pending");
        const approvedRecords = records.filter((record) => record.fields["Review Status"] === "Approved");

        globalFlaggedMap = await flagRecords(globalPendingRecords, approvedRecords);

        populateEventCodeDropdown(globalPendingRecords);
        renderTable();
      }

      function populateEventCodeDropdown(pendingRecords) {
        const select = document.getElementById("eventCodeFilter");
        // Reset options keeping only the first fallback item
        select.innerHTML = '<option value="">-- select code (shows all) --</option>';

        const codes = new Set();
        globalAllRecords.forEach((r) => {
          if (r.fields["Event Code (from Event Code)"]) {
            codes.add(r.fields["Event Code (from Event Code)"][0]);
          }
          if (r.fields["club_name (from club) (from Event Code)"]) {
            codes.add(r.fields["club_name (from club) (from Event Code)"][0]);
          }
        });

        Array.from(codes)
          .sort()
          .forEach((code) => {
            const opt = document.createElement("option");
            opt.value = code;
            opt.textContent = code;
            select.appendChild(opt);
          });
      }

      async function flagRecords(pendingRecords, approvedRecords) {
        const flaggedRecords = {};

        if (pendingRecords.length === 0) {
          return flaggedRecords;
        }

        for (const record of pendingRecords) {
          // Check age at time of submission
          const age = new Date(record.createdTime) - new Date(record.fields["Birthday"]);
          if (age < thirteenYearsInMs || age >= nineteenYearsInMs) {
            addFlagReason(flaggedRecords, record.id, {
              text: `age of ${Math.round(age / (1000 * 60 * 60 * 24 * 365))} years`,
            });
          }

          // Individual submission checks
          if (!record.fields["Event Code (from Event Code)"]) {
            if (!record.fields["Slack ID"]) {
              addFlagReason(flaggedRecords, record.id, { text: "missing slack id" });
            }
            try {
              const idResp = await fetch(
                `https://identity.hackclub.com/api/external/check?email=${encodeURIComponent(record.fields["Email"] || "")}`,
              );
              const idData = await idResp.json();
              if (idData.result !== "verified_eligible") {
                addFlagReason(flaggedRecords, record.id, { text: "idv: " + idData.result });
              }
            } catch {
              addFlagReason(flaggedRecords, record.id, { text: "error checking identity database" });
            }
          }

          // Duplicate checking routines against approved database
          for (const approvedRecord of approvedRecords) {
            if (record.fields["Email"] && record.fields["Email"] === approvedRecord.fields["Email"]) {
              addFlagReason(flaggedRecords, record.id, {
                text: "duplicate email of an approved submission",
                dupId: approvedRecord.id,
              });
            }
            try {
              if (record.fields["Code URL"] && approvedRecord.fields["Code URL"]) {
                if (
                  new URL(record.fields["Code URL"]).pathname === new URL(approvedRecord.fields["Code URL"]).pathname
                ) {
                  addFlagReason(flaggedRecords, record.id, {
                    text: "duplicate code url of an approved submission",
                    dupId: approvedRecord.id,
                  });
                }
              }
            } catch {}
            if (
              record.fields["Playable URL"] &&
              record.fields["Playable URL"] === approvedRecord.fields["Playable URL"]
            ) {
              addFlagReason(flaggedRecords, record.id, {
                text: "duplicate playable url of an approved submission",
                dupId: approvedRecord.id,
              });
            }
            if (record.fields["Slack ID"] && record.fields["Slack ID"] === approvedRecord.fields["Slack ID"]) {
              addFlagReason(flaggedRecords, record.id, {
                text: "duplicate slack id of an approved submission",
                dupId: approvedRecord.id,
              });
            }
            if (
              record.fields["First Name"] &&
              record.fields["Last Name"] &&
              record.fields["First Name"] === approvedRecord.fields["First Name"] &&
              record.fields["Last Name"] === approvedRecord.fields["Last Name"]
            ) {
              addFlagReason(flaggedRecords, record.id, {
                text: "duplicate full name of an approved submission",
                dupId: approvedRecord.id,
              });
            }
          }
        }
        return flaggedRecords;
      }

      function addFlagReason(flaggedRecords, recordID, reasonObj) {
        if (!flaggedRecords[recordID]) {
          flaggedRecords[recordID] = [];
        }
        // Deduplicate standard identical string logs
        const exists = flaggedRecords[recordID].some((r) => r.text === reasonObj.text && r.dupId === reasonObj.dupId);
        if (!exists) {
          flaggedRecords[recordID].push(reasonObj);
        }
      }

      function setFilter(filterType, element) {
        currentFilter = filterType;
        selectedEventCode = ""; // Reset the exclusive code select element
        document.getElementById("eventCodeFilter").value = "";

        document.querySelectorAll(".filter-btn").forEach((btn) => btn.classList.remove("active"));
        if (element) element.classList.add("active");
        renderTable();
      }

      function setEventFilter(eventCode) {
        selectedEventCode = eventCode;
        if (eventCode !== "") {
          // Deactivate the system filter buttons visually since we're viewing code scope
          document.querySelectorAll(".filter-btn").forEach((btn) => btn.classList.remove("active"));
          currentFilter = "event_code_scope";
        } else {
          // Fallback context if they re-select default option
          const targetBtn = document.querySelector(".filter-btn") || {};
          setFilter("flagged", targetBtn);
          return;
        }
        renderTable();
      }

      function renderTable() {
        const tbody = document.getElementById("records-table-body");
        tbody.innerHTML = "";

        const baseID = localStorage.getItem("baseID");
        const tableID = localStorage.getItem("tableID");
        const viewID = localStorage.getItem("viewID");

        var mainlist = [];
        if (currentFilter === "event_code_scope") {
          mainlist = globalAllRecords;
        } else {
          mainlist = globalPendingRecords;
        }
        const filtered = mainlist.filter((record) => {
          const flags = globalFlaggedMap[record.id] || [];
          const isFlagged = flags.length > 0;
          const isWorkshop = !!record.fields["Event Code (from Event Code)"];

          // If looking for a specific event code match (show all flagged and clean matching it)
          if (currentFilter === "event_code_scope") {
            console.log(
              "checking record for event code match:",
              selectedEventCode,
              record.fields["Event Code (from Event Code)"],
              record.fields["club_name (from club) (from Event Code)"],
            );
            if (record.fields["Event Code (from Event Code)"]) {
              return record.fields["Event Code (from Event Code)"][0].toLowerCase() === selectedEventCode.toLowerCase();
            } else if (record.fields["club_name (from club) (from Event Code)"]) {
              return (
                record.fields["club_name (from club) (from Event Code)"][0].toLowerCase() ===
                selectedEventCode.toLowerCase()
              );
            } else {
              return false; // if the record doesn't have an event code, it can't match the filter
            }
          }

          if (currentFilter === "all") return true;
          if (currentFilter === "flagged") return isFlagged;
          if (currentFilter === "workshop") return isFlagged && isWorkshop;
          if (currentFilter === "individual") return isFlagged && !isWorkshop;
          return true;
        });
        if (filtered.length === 0) {
          tbody.innerHTML = `<tr><td colspan="2" style="text-align: center; padding: 40px; color: #7c6e6d;">No records match the current view filter.</td></tr>`;
          return;
        }

        filtered.forEach((record) => {
          const fields = record.fields;
          const flags = globalFlaggedMap[record.id] || [];
          const isWorkshop = !!fields["Event Code (from Event Code)"];

          const row = document.createElement("tr");

          // Name & Base Account Column
          const nameCell = document.createElement("td");
          nameCell.innerHTML = `
            <strong>${fields["First Name"] || ""} ${fields["Last Name"] || "Unnamed"} <span title="${"decision reason: " + (fields["Decision Reason"] || "n/a")}\nnotes for the team: ${fields["Notes (for the team)"] || "n/a"}" class="review-status-${fields["Review Status"].toLowerCase().replace(" ", "-")}">(${fields["Review Status"]})</span></strong>
            <div>${
              isWorkshop
                ? `<span class="badge badge-workshop" title="${fields["Event Code (from Event Code)"]}">Workshop</span>`
                : `<span class="badge badge-individual">Individual</span>`
            }</div>
            <div class="text-muted"><a href="mailto:${fields["Email"]}" class="text-muted">${fields["Email"] || ""}</a></div>
            <div><a href="${fields["Slack ID"] ? `https://hackclub.slack.com/team/${fields["Slack ID"]}` : "#"}" target="_blank" style="font-size: 0.85rem; color: var(--accent-color);">
              ${fields["Slack ID"] ? fields["Slack ID"] : ""}
            </a></div>
            <div><a href="${fields["Code URL"] || "#"}" target="_blank" style="font-size: 0.85rem; color: var(--accent-color);">
              ${fields["Code URL"] ? "Code URL" : "No code url"}
            </a>
            </div>
            <div><a href="${fields["Playable URL"] || "#"}" target="_blank" style="font-size: 0.85rem; color: var(--accent-color);">
              ${fields["Playable URL"] ? "Playable URL" : "No playable url"}
            </a></div>
          `;
          row.appendChild(nameCell);

          // Audit Verdict Flags Column
          const flagsCell = document.createElement("td");
          if (flags.length > 0) {
            flags.forEach((reason) => {
              const tag = document.createElement("span");
              tag.className = "reason-tag";

              if (reason.dupId) {
                // Generate absolute dynamic Airtable record link
                const airtableLink = `https://airtable.com/${baseID}/${tableID}/${viewID}/${reason.dupId}?copyLinkToCellOrRecordOrigin=gridView`;
                tag.innerHTML = `${reason.text} (<a href="${airtableLink}" target="_blank">view original</a>)`;
              } else {
                tag.textContent = reason.text;
              }
              flagsCell.appendChild(tag);
            });
          } else {
            flagsCell.innerHTML = `<span class="no-flags">✓ not flagged</span>`;
          }
          row.appendChild(flagsCell);

          tbody.appendChild(row);
        });
      }

      onLoad();
    </script>
  </body>
</html>
